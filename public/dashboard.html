<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--card:#1a1a2e;--txt:#e0e0f0;--t2:#9494b8;--t3:#6b6b8a;--accent:#f97316;--red:#ef4444;--green:#22c55e;--blue:#3b82f6;--purple:#8b5cf6;--border:#2a2a4a;--radius:10px;--hdr-from:#1a1a3e;--hdr-to:#2d1b4e;--err-bg:rgba(239,68,68,.08);--pre-bg:rgba(0,0,0,.2);--btn-bg:rgba(255,255,255,.08)}
[data-theme="light"]{--bg:#f0f3f8;--card:#fff;--txt:#1e293b;--t2:#475569;--t3:#94a3b8;--accent:#ea580c;--red:#dc2626;--green:#16a34a;--blue:#2563eb;--purple:#7c3aed;--border:#e2e8f0;--hdr-from:#f1f5f9;--hdr-to:#e2e8f0;--err-bg:rgba(220,38,38,.06);--pre-bg:rgba(0,0,0,.04);--btn-bg:rgba(0,0,0,.06)}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--txt);padding:12px 10px 32px;max-width:800px;margin:0 auto;-webkit-font-smoothing:antialiased}
.header{background:linear-gradient(135deg,var(--hdr-from),var(--hdr-to));border-radius:var(--radius);padding:12px;margin-bottom:10px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px}
.header h1{font-size:16px;font-weight:800;letter-spacing:-.3px}.header h1 span{color:var(--accent)}
.header .sub{font-size:10px;color:var(--t2)}.header .time{font-size:9px;color:var(--t3);margin-top:1px}
.header .btns{display:flex;gap:4px}.header .btns button{background:var(--btn-bg);border:1px solid var(--border);color:var(--t2);padding:4px 7px;border-radius:6px;cursor:pointer;font-size:9px;white-space:nowrap;transition:all .2s}.header .btns button:hover{background:rgba(249,115,22,.2);color:var(--accent)}
.stats{display:flex;gap:5px;margin-bottom:10px}.stat{flex:1;background:var(--card);border-radius:var(--radius);padding:7px;border:1px solid var(--border);text-align:center;cursor:pointer}.stat:active{opacity:.7}.stat .l{font-size:9px;color:var(--t3);font-weight:600}.stat .v{font-size:18px;font-weight:800;margin-top:1px}.stat .v .u{font-size:9px;font-weight:400;color:var(--t3)}.stat.o .v{color:var(--accent)}.stat.g .v{color:var(--green)}.stat.b .v{color:var(--blue)}.stat.p .v{color:var(--purple)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}.col{min-width:0}
.section h2{font-size:11px;font-weight:700;color:var(--txt);margin-bottom:5px;display:flex;align-items:center;gap:4px}
.section h2 .badge{font-size:8px;padding:1px 5px;border-radius:6px;font-weight:600}
.badge-o{background:rgba(249,115,22,.15);color:var(--accent)}.badge-g{background:rgba(34,197,94,.15);color:var(--green)}.badge-p{background:rgba(139,92,246,.15);color:var(--purple)}.badge-b{background:rgba(59,130,246,.15);color:var(--blue)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.card{background:var(--card);border-radius:var(--radius);padding:8px 10px;border:1px solid var(--border);cursor:pointer;transition:border .2s}.card:hover{border-color:rgba(249,115,22,.3)}
.card .h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px;gap:4px}
.card .h .n{font-size:10px;font-weight:700;display:flex;align-items:center;gap:3px;flex:1;min-width:0;line-height:1.3}
.card .h .n .s{font-size:7px;padding:1px 4px;border-radius:3px;font-weight:600;flex-shrink:0}
.s-run{background:rgba(59,130,246,.12);color:var(--blue)}.s-pause{background:rgba(148,148,184,.12);color:var(--t2)}.s-ok{background:rgba(34,197,94,.12);color:var(--green)}.s-err{background:rgba(239,68,68,.12);color:var(--red)}
.card .h .toggle{font-size:7px;color:var(--t3);flex-shrink:0;margin-top:1px;transition:transform .2s}.card.open .h .toggle{transform:rotate(180deg)}
.card .m{font-size:8px;color:var(--t2);display:flex;gap:4px;flex-wrap:wrap;line-height:1.3}
.card .d{font-size:8px;color:var(--t3);line-height:1.3;margin-top:1px}
.card .err{font-size:8px;color:var(--red);background:var(--err-bg);padding:2px 4px;border-radius:3px;margin-top:2px;line-height:1.2}
.card .b{font-size:8px;color:var(--t3);border-top:1px solid var(--border);padding-top:2px;margin-top:3px;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.card .b .act{font-size:8px;background:rgba(249,115,22,.15);color:var(--accent);padding:2px 6px;border-radius:4px;font-weight:600;cursor:pointer;margin-left:auto;white-space:nowrap}.card .b .act:active{opacity:.6}
.card .preview{font-size:8px;color:var(--t3);background:var(--pre-bg);padding:2px 4px;border-radius:3px;margin-top:2px;font-family:monospace;line-height:1.2;overflow:hidden;max-height:22px;white-space:pre-wrap}
.card .extra{display:none;margin-top:3px;padding-top:3px;border-top:1px solid var(--border)}.card.open .extra{display:block}
.card .full-desc{font-size:8px;color:var(--txt);line-height:1.4;white-space:pre-wrap}
.skills-row{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}.skills-row span{font-size:8px;background:rgba(59,130,246,.08);color:var(--blue);padding:1px 5px;border-radius:3px;border:1px solid rgba(59,130,246,.1);cursor:default}
.tl{padding-left:12px;position:relative}.tl::before{content:'';position:absolute;left:3px;top:3px;bottom:3px;width:1.5px;background:var(--border)}
.tl-item{position:relative;padding:2px 0 4px 8px}.tl-item::before{content:'';position:absolute;left:-11px;top:5px;width:5px;height:5px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}.tl-item.ok::before{background:var(--green)}.tl-item.ko::before{background:var(--red)}
.tl-item .tt{font-size:8px;color:var(--t3)}.tl-item .tn{font-size:9px;font-weight:600;margin:1px 0}.tl-item .ts{font-size:8px}.tl-item .ts.ok{color:var(--green)}.tl-item .ts.ko{color:var(--red)}
.cat{font-size:8px;font-weight:600;color:var(--t3);margin:5px 0 2px;letter-spacing:.3px}
.popup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;justify-content:center;align-items:flex-start;padding:24px 10px;overflow-y:auto}.popup.show{display:flex}
.popup-inner{background:var(--card);border-radius:var(--radius);padding:14px;max-width:500px;width:100%;border:1px solid var(--border);animation:fade .2s}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.popup-inner h3{font-size:13px;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
.popup-inner h3 button{background:transparent;border:none;color:var(--t3);font-size:15px;cursor:pointer;padding:0 4px}.popup-inner .body{max-height:50vh;overflow-y:auto}
.popup-inner .sc{margin-bottom:6px}.popup-inner .sc h4{font-size:10px;color:var(--accent);margin-bottom:2px;font-weight:600}.popup-inner .sc .si{font-size:9px;color:var(--t2);padding:1px 0;border-bottom:1px solid var(--border)}
.empty{padding:10px;text-align:center;color:var(--t3);font-size:10px}
@media(max-width:520px){

  .skills-row span{font-size:8px}

  .cat{font-size:8px;margin:4px 0 2px}
  .empty{padding:8px;font-size:9px}
}

const $=id=>document.getElementById(id);
const SNAP=typeof __SNAPSHOT__!=='undefined'?__SNAPSHOT__:null;

function ago(t){if(!t)return'—';const m=(Date.now()-new Date(t).getTime())/60000;if(m<1)return'刚刚';if(m<60)return Math.round(m)+'分前';const h=Math.floor(m/60);if(h<24)return h+'小时前';return Math.floor(h/24)+'天前'}
function tm(t){if(!t)return'—';const d=new Date(t);return String(d.getMonth()+1)+'/'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function tr(s,n=50){return s&&s.length>n?s.slice(0,n)+'…':s||''}
function stg(o){if(o.paused_at)return'<span class="s-pause">⏸</span>';if(!o.enabled)return'<span class="s-pause">⛔</span>';return'<span class="s-run">▶</span>'}

function render(cr,sr,pr,sk){
  const j=cr.jobs||[],sp=sr.scripts||[],pj=pr.projects||[];
  $('stats').innerHTML=`<div class="stat o" onclick="document.getElementById('cronSec').scrollIntoView({behavior:'smooth'})"><div class="l">定时</div><div class="v">${j.length}<span class="u">个</span></div></div><div class="stat p" onclick="document.getElementById('scriptSec').scrollIntoView({behavior:'smooth'})"><div class="l">脚本</div><div class="v">${sp.length}<span class="u">个</span></div></div><div class="stat g" onclick="document.getElementById('projSec').scrollIntoView({behavior:'smooth'})"><div class="l">系统</div><div class="v">${pj.length}<span class="u">套</span></div></div><div class="stat b" onclick="document.getElementById('skillSec').scrollIntoView({behavior:'smooth'})"><div class="l">技能</div><div class="v">${(sk&&sk.total)||0}<span class="u">个</span></div></div>`;

  $('cronBadge').textContent=j.length;
  $('cronList').innerHTML=j.length?j.map(o=>{
    const ok=o.last_status==='ok',e=o.last_status==='error';
    const sched=o.schedule_display||(o.schedule&&o.schedule.expr)||'—';
    const sd=o.prompt?tr(o.prompt.replace(/\n/g,' '),30):(o.script||'—');
    return `<div class="card" onclick="this.classList.toggle('open')"><div class="h"><div class="n">${e?'⚠️':'⏰'}${o.name||''}${stg(o)}</div><span class="toggle">▼</span></div><div class="m"><span>${sched}</span><span>▶${tm(o.next_run_at)}</span></div>${o.last_error?`<div class="err">${tr(o.last_error,40)}</div>`:''}<div class="b"><span>${sd}</span><span>🔄${o.repeat&&o.repeat.completed||0}</span></div><div class="extra"><div class="full-desc">${ok?'✅成功':'❌失败('+tm(o.last_run_at)+')'} · ${o.enabled===false?'⛔关闭':o.paused_at?'⏸暂停':'▶运行'}\n${sched} · ${o.repeat&&o.repeat.completed||0}次\n${o.prompt||o.script||''}</div>${o.last_error?`<div class="full-desc">❌${o.last_error}</div>`:''}</div></div>`;
  }).join(''):'<div class="empty">无任务</div>';

  $('scriptBadge').textContent=sp.length;
  $('scriptList').innerHTML=sp.length?sp.map(s=>{
    const py=s.name.endsWith('.py'),pv=s.header?s.header.replace(/#/g,'').trim():'(无)';
    return `<div class="card" onclick="this.classList.toggle('open')"><div class="h"><div class="n">${py?'🐍':'📜'}${s.name}</div><span class="toggle">▼</span></div><div class="b"><span>📏${(s.size/1024).toFixed(1)}KB</span><span>${ago(s.modified)}</span></div><div class="preview">${tr(pv,40)}</div><div class="extra"><div class="full-desc">${s.name}\n${(s.size/1024).toFixed(1)}KB · ${ago(s.modified)}前\n\n${s.header||''}</div></div></div>`;
  }).join(''):'<div class="empty">无脚本</div>';

  $('projectBadge').textContent=pj.length;
  if(pj.length){const g={};pj.forEach(o=>{const c=o.category||'其他';if(!g[c])g[c]=[];g[c].push(o)});let h='';Object.entries(g).forEach(([c,is])=>{h+=`<div class="cat">${c} (${is.length})</div><div class="grid">`;is.forEach(o=>{h+=`<div class="card" onclick="this.classList.toggle('open')"><div class="h"><div class="n">${o.icon||'🔧'}${o.name}</div><span class="toggle">▼</span></div><div class="d">${tr(o.desc,50)}</div><div class="b"><span>${o.tech||'—'}</span>${o.version?'<span>v'+o.version+'</span>':''}${o.url?`<span class="act" onclick="event.stopPropagation();window.open('${o.url}','_blank')">▶打开</span>`:''}</div><div class="extra"><div class="full-desc">${o.desc||''}${o.version?'\nv'+o.version:''}\n${o.tech||''}${o.url?'\n'+o.url:''}</div></div></div>`;});h+=`</div>`;});$('projectList').innerHTML=h;}else $('projectList').innerHTML='<div class="empty">无系统</div>';

  const t=sk&&sk.total||0;$('skillBadge').textContent=t;$('skillTotal').textContent=t;
  const es=sk&&sk.byCategory?Object.entries(sk.byCategory):[];
  if(es.length){const lbs={'restaurant-management':'🍽️餐饮','apple':'🍎Apple','autonomous-ai-agents':'🤖AI','data-science':'📊数据','openclaw-imports':'📦导入','mlops':'🧪MLOps','productivity':'⚡效率','creative':'🎨创意'};$('skillList').innerHTML=es.slice(0,4).map(([c,is])=>`<div style="margin-bottom:4px"><div style="font-size:9px;font-weight:600;color:var(--accent);margin-bottom:1px">${lbs[c]||c.split('-').pop()} (${is.length})</div><div class="skills-row">${is.slice(0,5).map(n=>`<span>${n.split('-').pop()}</span>`).join('')}${is.length>5?`<span style="background:rgba(249,115,22,.08);color:var(--accent)">+${is.length-5}</span>`:''}</div></div>`).join('');if(es.length>4)$('skillList').innerHTML+=`<div style="font-size:8px;color:var(--t3);margin-top:2px;cursor:pointer" onclick="showSkills()">📋全部${t}个→</div>`;$('skillDetail').innerHTML=es.map(([c,is])=>`<div class="sc"><h4>${c.replace(/-/g,'·')} (${is.length})</h4>${is.map(n=>`<div class="si">${n}</div>`).join('')}</div>`).join('');}else $('skillList').innerHTML='<div class="empty">无技能</div>';

  const runs=j.filter(j=>j.last_run_at).sort((a,b)=>new Date(b.last_run_at)-new Date(a.last_run_at)).slice(0,6);
  $('tlList').innerHTML=runs.length?runs.map(j=>{const ok=j.last_status==='ok';return`<div class="tl-item ${ok?'ok':'ko'}"><div class="tt">${ago(j.last_run_at)}</div><div class="tn">${j.name||'未知'}</div><div class="ts ${ok?'ok':'ko'}">${ok?'✅':'❌'}</div></div>`;}).join(''):'<div class="empty">暂无</div>';

  $('updateTime').textContent=new Date().toLocaleTimeString('zh-CN',{hour12:false});
}

function showSkills(){$('skillPopup').classList.add('show')}
function hideSkills(){$('skillPopup').classList.remove('show')}
function toggleTheme(){const h=document.documentElement;const l=h.getAttribute('data-theme')==='light';if(l){h.removeAttribute('data-theme');$('themeBtn').textContent='☀️';localStorage.setItem('zm_dash_theme','dark')}else{h.setAttribute('data-theme','light');$('themeBtn').textContent='🌙';localStorage.setItem('zm_dash_theme','light')}}
(function(){const s=localStorage.getItem('zm_dash_theme');if(s==='light'){document.documentElement.setAttribute('data-theme','light');if($('themeBtn'))$('themeBtn').textContent='🌙'}})();

async function refresh(){
  try{
    const t=Date.now();
    const [cr,sr,pr,sk]=await Promise.all([
      fetch('/api/automation/cron?_='+t).then(r=>r.json()).catch(()=>null),
      fetch('/api/automation/scripts?_='+t).then(r=>r.json()).catch(()=>null),
      fetch('/api/automation/projects?_='+t).then(r=>r.json()).catch(()=>null),
      fetch('/api/automation/skills?_='+t).then(r=>r.json()).catch(()=>null),
    ]);
    if(cr&&cr.jobs&&cr.jobs.length){render(cr,sr||{scripts:[]},pr||{projects:[]},sk||{});return}
  }catch(e){}
  if(SNAP)render(SNAP.cron||{jobs:[]},{scripts:SNAP.scripts||[]},{projects:SNAP.projects||[]},SNAP.skills||{});
}
refresh();
setInterval(refresh,30000);
</script></body></html>
