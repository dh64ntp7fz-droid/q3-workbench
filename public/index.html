<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>邹慧明 · 三季度工作台</title>
<style>
:root{--bg:#f0f3f8;--card:#fff;--txt:#1e293b;--t2:#334155;--t3:#475569;--bd:#e2e8f0;--bd2:#f8fafc;--inp:#f8fafc;--chk:#cbd5e1;--dim:#f1f5f9}[data-theme="dark"]{--bg:#0f172a;--card:#1e293b;--txt:#e2e8f0;--t2:#475569;--t3:#475569;--bd:#334155;--bd2:#1a2332;--inp:#1a2332;--chk:#475569;--dim:#1a2332}body{background:var(--bg);color:var(--txt);transition:background .3s,color .3s}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:var(--bg);color:var(--txt);padding:12px 11px 48px;max-width:860px;margin:0 auto;-webkit-font-smoothing:antialiased}

.header{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-radius:16px;padding:18px 16px 14px;margin-bottom:14px;box-shadow:0 4px 16px rgba(99,102,241,.25)}
.header h1{font-size:19px;font-weight:800;letter-spacing:-.3px}
.header .sub{font-size:11px;opacity:.8;margin-top:4px}
.header .quote{font-size:10px;opacity:.6;margin-top:8px;font-style:italic}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:#fff;border-radius:12px;padding:10px 12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat-card .l{font-size:10px;color:var(--t3);font-weight:600}
.stat-card .v{font-size:22px;font-weight:800;margin-top:1px;line-height:1.2}
.stat-card.red .v{color:#ef4444}
.stat-card.green .v{color:#10b981}
.stat-card.blue .v{color:#6366f1}
.stat-card.purple .v{color:#8b5cf6}
.stat-card .v .sub{font-size:11px;font-weight:400;color:#94a3b8}
.stat-bar{height:3px;background:var(--dim);border-radius:4px;margin-top:5px;overflow:hidden}
.stat-bar .fill{height:100%;border-radius:4px;transition:width .6s ease}

.hint{font-size:11px;font-weight:700;color:var(--t2);margin:16px 0 4px;letter-spacing:.3px}

.card{background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:transform .15s}
.card:active{transform:scale(.995)}
.grp-head{font-size:13px;font-weight:700;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;color:#fff}
.grp-head .prog{font-size:11px;opacity:.85}
.grp-head .cyc{font-size:10px;opacity:.7;font-weight:400}

.grp-must .grp-head{background:linear-gradient(135deg,#ef4444,#f87171)}
.grp-daily .grp-head{background:linear-gradient(135deg,#8b5cf6,#a78bfa)}
.grp-weekly .grp-head{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#5c3d06}
.grp-biweekly .grp-head{background:linear-gradient(135deg,#ec4899,#f472b6)}
.grp-monthly .grp-head{background:linear-gradient(135deg,#6366f1,#818cf8)}
.grp-decade .grp-head{background:linear-gradient(135deg,#14b8a6,#2dd4bf)}

.row{display:flex;align-items:flex-start;padding:11px 14px;border-bottom:1px solid var(--bd2);min-height:48px;cursor:pointer;user-select:none;transition:background .15s,transform .1s}
.row:last-child{border-bottom:none}
.row:active{background:#f8fafc}
.row.done{background:#f0fdf4}
.row.done .r-t{text-decoration:line-through;color:#94a3b8}
.row.done .r-d{color:#cbd5e1}

.ck{width:24px;height:24px;min-width:24px;border:2px solid var(--chk);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin:2px 12px 0 0;font-size:13px;color:#fff;background:#fff;transition:.25s cubic-bezier(.4,0,.2,1)}
.row.done .ck{border-color:#10b981;background:#10b981;transform:scale(1.1)}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1.05)}}
.row.done .ck{animation:pop .3s ease}

.r-b{flex:1;min-width:0}
.r-t{font-size:14px;font-weight:600;line-height:1.3;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.r-d{font-size:11px;color:var(--t3);margin-top:2px;line-height:1.4}
.r-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.tg{font-size:10px;padding:1px 7px;border-radius:5px;white-space:nowrap}
.tg.who{background:#fef3c7;color:#92400e;font-weight:600}
.tg.tab{background:var(--dim);color:#64748b}
.tg.stamp{background:#10b981;color:#fff}
.tg.fine{background:#ef4444;color:#fff;font-weight:700}

.row.must-fine{border-left:4px solid #ef4444}
.row.must-fine.done{border-left-color:#10b981}

.edit-btn{background:none;border:none;font-size:11px;cursor:pointer;padding:2px 5px;border-radius:4px;color:#cbd5e1;transition:.2s;flex-shrink:0}
.edit-btn:hover{color:var(--t2);background:#f1f5f9}

.dl{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--bd2);cursor:pointer;transition:background .15s;min-height:48px}
.dl:last-child{border-bottom:none}
.dl.done{background:#f0fdf4}.dl.done .dl-t{text-decoration:line-through;color:#94a3b8}.dl.done .dl-m{color:#94a3b8}.dl.done .ck{border-color:#10b981;background:#10b981;animation:pop .3s ease}
.dl:active{background:#f8fafc}
.dl-n{text-align:center;min-width:46px;flex-shrink:0}
.dl-n .num{font-size:22px;font-weight:800;line-height:1;color:#f59e0b}
.dl-n .u{font-size:9px;color:#94a3b8}
.dl.done .dl-n .num{font-size:15px;color:#10b981}
.dl.over .dl-n .num{color:#ef4444}
.dl.soon .dl-n .num{color:#ef4444}
.dl-i{flex:1;min-width:0}
.dl-t{font-size:13px;font-weight:700}
.dl-m{font-size:10px;color:var(--t3);margin-top:2px}
.dl-c{width:24px;height:24px;min-width:24px;border:2px solid var(--chk);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:#fff;background:#fff;transition:.25s}
.dl.done .dl-c{border-color:#10b981;background:#10b981}
.evt .dl-n .num{color:#6366f1;font-size:16px}

/* Temp tasks */
.temp-form{display:flex;gap:8px;padding:8px 14px;border-bottom:2px solid #f1f5f9}
.temp-form input{flex:1;border:2px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:13px;outline:none;transition:.2s}
.temp-form input:focus{border-color:#6366f1}
.temp-form button{width:40px;min-width:40px;border:none;border-radius:10px;background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;font-weight:700;font-size:20px;cursor:pointer;transition:.2s}
.temp-form button:active{transform:scale(.92)}
.temp-item{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--bd2);font-size:13px;gap:8px;transition:background .15s}
.temp-item .ti-ck{width:22px;height:22px;min-width:22px;border:2px solid var(--chk);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;background:#fff;transition:.2s}
.temp-item.done .ti-ck{border-color:#10b981;background:#10b981;color:#fff}
.temp-item.done{background:#f0fdf4}
.temp-item.done span{text-decoration:line-through;color:#94a3b8}

/* Store visit */
.sv-card{background:var(--card);border-radius:14px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.04);margin-bottom:12px}
.sv-card select,.sv-card textarea,.sv-card input{width:100%;border:2px solid #e2e8f0;border-radius:10px;padding:9px 10px;font-size:13px;background:var(--inp);color:var(--txt);font-family:inherit;margin-bottom:8px;transition:.2s}
.sv-card select:focus,.sv-card textarea:focus,.sv-card input:focus{border-color:#6366f1;outline:none}
.sv-card textarea{min-height:50px;resize:vertical}
.sv-label{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:3px;display:block}
.sv-item{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px}
.sv-ck{width:22px;height:22px;min-width:22px;border:2px solid var(--chk);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;cursor:pointer;background:#fff;transition:.2s}
.sv-ck.checked{border-color:#10b981;background:#10b981;color:#fff}
.sv-submit{width:100%;padding:11px;border:none;border-radius:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-weight:700;font-size:14px;cursor:pointer;margin-top:6px;transition:.2s;box-shadow:0 4px 12px rgba(99,102,241,.25)}
.sv-submit:active{transform:scale(.97)}
.sv-hist-item{font-size:12px;padding:7px 10px;border-bottom:1px solid var(--bd2);display:flex;justify-content:space-between;align-items:flex-start;gap:8px}

.ledger-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--bd2);font-size:13px}
.ledger-item:last-child{border-bottom:none}
.lg-cnt{font-weight:800;color:#6366f1;font-size:17px}
.lg-note{font-size:10px;color:#cbd5e1;text-align:center;padding:6px}

.btns{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.btns button{flex:1;min-width:70px;background:#fff;border:1.5px solid #e2e8f0;color:var(--t2);font-size:10px;padding:9px 8px;border-radius:10px;cursor:pointer;font-weight:600;transition:.15s;white-space:nowrap}
.btns button:active{background:var(--dim);transform:scale(.96)}
.foot{text-align:center;font-size:10px;color:#cbd5e1;margin-top:12px;line-height:1.6}

.toast-wrap{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.toast-wrap.show{display:flex}
.toast-box{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:48px 40px;border-radius:24px;font-size:28px;font-weight:800;text-align:center;max-width:88%;box-shadow:0 24px 80px rgba(99,102,241,.5);line-height:1.5;animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both}
.toast-box .sub{font-size:14px;font-weight:400;opacity:.8;margin-top:12px;display:block}
@keyframes popIn{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}


@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card,.sv-card{animation:fadeIn .4s ease both}
.card:nth-child(2){animation-delay:.04s}

@media(min-width:600px){.stats{grid-template-columns:repeat(4,1fr)}body{padding:16px 16px 48px}}
@media print{body{background:#fff;padding:0;color:#000}.header,.hint,.btns,.stats,.temp-form,.sv-card,.toast{display:none!important}.card{box-shadow:none;border:1px solid #ddd}}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.toast.show{font-size:15px;padding:14px 28px;background:linear-gradient(135deg,#6366f1,#8b5cf6);box-shadow:0 8px 32px rgba(99,102,241,.4)}

[data-theme="dark"] #svZone [style*="background:#fff"]{background:var(--card)!important}
[data-theme="dark"] #svZone [style*="background:#f8fafc"]{background:var(--inp)!important}
[data-theme="dark"] #svZone [style*="color:#1e293b"]{color:var(--txt)!important}
[data-theme="dark"] #svZone [style*="color:#64748b"]{color:var(--t2)!important}
[data-theme="dark"] #svZone [style*="color:#94a3b8"]{color:var(--t3)!important}
[data-theme="dark"] #tempZone div[style*="background:#f8fafc"]{background:var(--inp)!important;color:var(--txt)!important}

.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center}
.settings-overlay.show{display:flex}
.settings-panel{background:#fff;border-radius:16px;padding:20px;width:90%;max-width:420px;max-height:80vh;overflow-y:auto}
.settings-panel h3{font-size:16px;margin-bottom:16px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #e2e8f0;font-size:13px}
.settings-toggle{width:48px;height:26px;border-radius:13px;cursor:pointer;position:relative;transition:.2s;border:none;flex-shrink:0;margin-left:8px}
.settings-toggle.on{background:#10b981}.settings-toggle.off{background:#cbd5e1}
.settings-toggle::after{content:'';position:absolute;top:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.settings-toggle.on::after{left:25px}.settings-toggle.off::after{left:3px}
.settings-del{background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px;padding:4px 8px}
.settings-close{width:100%;padding:10px;border:none;border-radius:10px;background:#f1f5f9;font-weight:700;margin-top:12px;cursor:pointer;font-size:14px}
.gear-btn{background:none;border:none;font-size:14px;cursor:pointer;padding:2px 6px;opacity:.6;transition:.2s;color:#fff;min-width:32px;min-height:32px}

/* ── 情绪价值 ── */
@keyframes floatUp{0%{transform:translateY(0) scale(0);opacity:0}20%{transform:translateY(-10px) scale(1);opacity:1}100%{transform:translateY(-160px) scale(.3);opacity:0}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes shimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes streakGlow{0%,100%{box-shadow:0 0 8px rgba(251,191,36,.3)}50%{box-shadow:0 0 20px rgba(251,191,36,.6)}}
.header{animation:shimmer 8s ease infinite;background-size:200% 200%!important}
.streak-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(251,191,36,.25);color:#fbbf24;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;animation:streakGlow 2s ease infinite;cursor:pointer;transition:.2s}
.streak-badge:active{transform:scale(.9)}
.cheer-btn{background:none;border:none;font-size:24px;cursor:pointer;transition:.2s;color:rgba(255,255,255,.7);min-width:44px;min-height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cheer-btn:active{transform:scale(1.3);background:rgba(255,255,255,.15)}
.float-emoji{position:fixed;pointer-events:none;z-index:9998;animation:floatUp 1.8s ease-out forwards}
.row .ck{transition:transform .15s cubic-bezier(.34,1.56,.64,1),background .2s,border-color .2s}
.row.done .ck{transform:scale(1.15)}

/* ── 进场情绪 ── */

.splash-dot:nth-child(2){animation-delay:.2s}
.splash-dot:nth-child(3){animation-delay:.4s}

@media(max-width:480px){.splash-emoji{font-size:56px}.splash-text h2{font-size:24px}.splash-text p{font-size:14px}}
/* 点击logo彩蛋 */
@keyframes easterEgg{0%{transform:rotate(0deg)}25%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}75%{transform:rotate(-5deg)}100%{transform:rotate(0deg)}}
.egg-shake{animation:easterEgg .4s ease}
/* 随机彩蛋飘浮 */
@keyframes popUpEmoji{0%{opacity:0;transform:translateY(40px) scale(0)}30%{opacity:1;transform:translateY(0) scale(1.1)}60%{transform:translateY(-10px) scale(1)}100%{opacity:0;transform:translateY(-40px) scale(.5)}}
.pop-emoji{position:fixed;font-size:36px;pointer-events:none;z-index:99998;animation:popUpEmoji .8s ease-out forwards}

.splash{position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a2e;overflow:hidden;pointer-events:none}
.splash-canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.splash-overlay{position:relative;z-index:2;text-align:center;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:0 20px;pointer-events:none}
.splash-overlay .daily{font-size:22px;font-weight:500;margin-bottom:16px;text-shadow:0 2px 20px rgba(0,0,0,.8);opacity:.95}
.splash-overlay .icon{font-size:36px;margin-bottom:4px;display:block}
.splash-overlay .title{font-size:20px;font-weight:700;margin:2px 0 10px;text-shadow:0 2px 20px rgba(0,0,0,.8)}
.splash-overlay .line{width:50px;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);margin:6px auto}
.splash-overlay .bar{position:relative;width:140px;height:2px;background:rgba(255,255,255,.15);border-radius:2px;margin:14px auto 0;overflow:hidden}
.splash-overlay .bar-fill{height:100%;width:0;border-radius:2px;background:linear-gradient(90deg,#6366f1,#a5b4fc);animation:barLoad 2.2s ease-out forwards}
@keyframes barLoad{0%{width:0}100%{width:100%}}
.game-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:linear-gradient(135deg,#0b0f1a,#1e293b);color:#fff;cursor:pointer;user-select:none}
.game-bar span{font-size:13px;font-weight:700}
.game-bar button{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:11px;padding:4px 12px;border-radius:8px;cursor:pointer;font-weight:600}
.game-canvas-wrap{background:#0b0f1a;padding:10px;text-align:center}
.game-canvas-wrap canvas{background:#1a1a2e;border-radius:8px;display:block;margin:0 auto;image-rendering:pixelated;max-width:100%}
</style>
</head>
<body style="min-height:100vh">
<div class="splash" id="splash">
  <div class="splash-text">
    <p id="splashDaily" style="font-size:20px;opacity:.9;margin-bottom:20px;font-weight:500;color:#fff">☀️ 早安，又是崭新的一天</p>
    <span class="icon">☀️</span>
    <h2 style="font-size:24px;font-weight:700;color:#fff;margin:10px 0 6px">邹慧明 · 三季度工作台</h2>
    <div class="line"></div>
    <div class="splash-bar"><div class="splash-bar-fill"></div></div>
  </div>/div>

<div class="header"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><h1>🧭 邹慧明 · 三季度工作台</h1>
  <div class="sub">上级：赵新华 &nbsp;|&nbsp; <span id="today"></span> &nbsp;|&nbsp; 核心：动作准时交</div>
  <div class="quote" id="dailyQuote"></div></div><button id="dmBtn" onclick="var h=document.documentElement;var cur=h.getAttribute('data-theme')||'light';var nxt=cur==='dark'?'light':'dark';h.setAttribute('data-theme',nxt);this.textContent=nxt==='dark'?'☀️':'🌙';localStorage.setItem('zm_theme',nxt)" style="background:rgba(255,255,255,.2);border:none;color:#fff;font-size:22px;cursor:pointer;min-width:48px;min-height:48px;border-radius:50%;flex-shrink:0">🌙</button></div></div>
<div class="game-wrap" id="gameWrap">
  <div class="game-bar" onclick="toggleGame()">
    <span>🎮 减压小游戏</span>
    <span style="font-size:10px;opacity:.6">空格/点击跳跃 · 躲避障碍物</span>
    <button onclick="event.stopPropagation();startGame()">▶ 开始</button>
  </div>
  <div class="game-canvas-wrap">
    <canvas id="gameCanvas" width="320" height="120"></canvas>
  </div>
</div>
<div class="stats" id="statsZone"></div>

<div class="hint" id="h_must" style="cursor:pointer;user-select:none" onclick="toggleSection('must')"><span id="a_must">▼</span> 🔴 每日必交 · 不交有后果</div>
<div class="card grp-must" id="mustZone"></div>

<div class="hint" id="h_daily" style="cursor:pointer;user-select:none" onclick="toggleSection('daily')"><span id="a_daily">▼</span> 🔧 每日动作 · 自查</div>
<div class="card grp-daily" id="dailyZone"></div>

<div class="hint" id="h_wact" style="cursor:pointer;user-select:none" onclick="toggleSection('wact')"><span id="a_wact">▼</span> 📅 每周固定动作 · 自查（周一重置）</div>
<div class="card grp-weekly" id="wactZone"></div>

<div class="hint" id="h_temp" style="cursor:pointer;user-select:none" onclick="toggleSection('temp')"><span id="a_temp">▼</span> 📋 临时事项 · 随手添加，自动同步</div>
<div class="card" id="tempZone"></div>

<div class="hint" id="h_cycle" style="cursor:pointer;user-select:none" onclick="toggleSection('cycle')"><span id="a_cycle">▼</span> 📤 周期交付 · 赵总/运营部检核</div>
<div id="cycleZone"></div>

<div class="hint" id="h_dl" style="cursor:pointer;user-select:none" onclick="toggleSection('dl')"><span id="a_dl">▼</span> ⏰ 截止 & 日程 <span class="gear-btn" onclick="event.stopPropagation();openSettings('dl')" style="color:var(--t2)!important;font-size:12px">⚙</span></div>
<div class="card" id="dlZone"></div>

<div class="hint" id="svToggle" style="cursor:pointer;user-select:none" onclick="toggleSV()">
  <span id="svArrow">▼</span> 📋 驻店记录 · 巡店检查（配套桌面巡店表）

function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function weekStr(){const d=new Date();const y=d.getFullYear();const d0=new Date(y,0,1);return y+'-W'+String(Math.ceil(((d-d0)/86400000+d0.getDay()+1)/7)).padStart(2,'0')}
function monthStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function daysLeft(due){const d=new Date(due);d.setHours(0,0,0,0);return Math.round((d-new Date(new Date().setHours(0,0,0,0)))/86400000)}
function decadeStr(){return String(Math.floor((new Date()-new Date('2026-01-01'))/86400000/10))}

function toast(msg,isBig){

  if(isBig){
    const emoji=['🎉','🎊','✨','💫','🌟','⭐','🔥','💪','🏆'];
    const bigEmoji=emoji[Math.floor(Math.random()*emoji.length)];

    box.style.fontSize=window.innerWidth<480?'22px':'28px';
    wrap.classList.add('show');
    clearTimeout(wrap._to);
    wrap._to=setTimeout(()=>wrap.classList.remove('show'),6000);
  }else{
    const old=document.getElementById('toastOld');
    if(!old){
      const el=document.createElement('div');
      el.id='toastOld';el.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:600;z-index:10000;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.15)';
      document.body.appendChild(el);
    }
    const t=document.getElementById('toastOld');
    t.textContent=msg;t.style.opacity='1';clearTimeout(t._to);
    t._to=setTimeout(()=>t.style.opacity='0',2500);
  }
}

function emoToast(){
  const s=load();const t=todayStr();const muDone=MUST.filter(m=>s.mu[m.id]===t).length;
  let msg;
  if(muDone===MUST.length){
    msg=BIG_MSGS[Math.floor(Math.random()*BIG_MSGS.length)];
    confetti();
    setTimeout(()=>toast(msg,true),200);
  }else{
    msg=C_MSGS[Math.floor(Math.random()*C_MSGS.length)];

}
function confetti(){
  for(let i=0;i<20;i++){
    const e=document.createElement('div');
    e.textContent=['🎉','🎊','✨','💫','🌟','⭐','🔥','💪'][Math.floor(Math.random()*8)];

    document.body.appendChild(e);
    setTimeout(()=>e.remove(),3000);
  }
}

function tCycle(id,k){
  const s=load();s.cy=s.cy||{};const cur=k==='monthly'?monthStr():(k==='decade'?decadeStr():weekStr());

  const s=load();s.lg=s.lg||{};const t=todayStr();s.lgd=s.lgd||{};

function svSave(){
  const s=load();s.sv=s.sv||[];
  const totalChecks=Object.values(svDraft.checks).filter(Boolean).length;
  const totalItems=Object.values(svDraft.checks).length;
  const noteSummary=[];
  Object.keys(svDraft.notes).forEach(id=>{if(svDraft.notes[id])noteSummary.push(id+':'+svDraft.notes[id].substring(0,40));});
  const record={store:svDraft.store,date:todayStr(),time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),checks:{...svDraft.checks},notes:{...svDraft.notes},numbers:{...svDraft.numbers},resolved:svDraft.resolved,checkCount:totalChecks,summary:noteSummary.join('; ')};
  s.sv.unshift(record);
  if(s.sv.length>30)s.sv=s.sv.slice(0,30);
  save(s);

  // Send to WeChat Work webhook
  const WECOM_URL='https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=d35ec9fd-b3e2-4132-848c-0fbc7ab38107';
  const now=new Date().toLocaleString('zh-CN');
  let bulletList=SV_DIMENSIONS.map(dim=>{
    const dimLabel=dim.label.replace('🌀','').replace('🍽️','').replace('🧹','').replace('【','').replace('】','').replace('🍽','').trim();
    let section=dimLabel+'\n';
    section+=dim.items.map(it=>{
      let lines='';
      if(it.checks){
        lines=it.checks.map(ch=>{
          const prefix=(ch.text==='达标'||ch.text==='达标？') ? it.label+'→' : '';
          return prefix+ch.text.substring(0,22)+'：'+(record.checks[ch.key]?'✓':'✗');
        }).join('\n');
      }
      if(it.type==='number'){
        lines=it.label+'：'+((record.numbers||{})[it.key]||'未填')+it.unit;
      }
      if(it.type==='text'){
        const txt=(record.notes||{})[it.key];
        lines=it.label+'：'+(txt?txt.substring(0,40):'未填');
      }
      const noteKey='note_'+it.id;
      const noteVal=(record.notes||{})[noteKey];
      if(noteVal)lines+='  ⚡备注：'+noteVal.substring(0,40);
      return lines;
    }).filter(Boolean).join('\n');
    return section;
  }).join('\n\n');
  fetch('/api/send-wecom',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    store:record.store,date:record.date,time:record.time,
    checkCount:totalChecks,totalItems:totalItems,
    resolved:svDraft.resolved||'',
    notes:{zhenggai:svDraft.notes.zhenggai||'',wenti:svDraft.notes.wenti||'',daijiao:svDraft.notes.daijiao||''},
    bulletList:bulletList,pushSummary:getPushSummary()
  })}).then(r=>r.json()).then(j=>{
    if(j.errcode===0)toast('✅ 已保存并发送至企业微信');
    else toast('✅ 已保存（企业微信发送失败:'+j.errmsg+'）');
  }).catch(e=>{toast('✅ 已保存')});

  svDraft={store:'长安花园',checks:{},notes:{},numbers:{},resolved:''};
  if(svCollapsed){svCollapsed=false;localStorage.setItem('zm_sv_collapsed','0');document.getElementById('svArrow').textContent='▼';document.getElementById('svZone').style.display='block';}
  renderSV();
}

var trayAnimId=null;
function startTrayAnimation(){
  var canvas=document.getElementById('splashCanvas');if(!canvas)return;


  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const replayBtn = document.getElementById('replay');

  // --- Canvas sizing ---
  const W = 960, H = 540;
  const scale = Math.min(canvas.parentElement.clientWidth / W, canvas.parentElement.clientHeight / H, 1.3);
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';

  // --- Easing ---
  const ease = {
    out: t => 1 - Math.pow(1 - t, 3),
    in: t => t * t * t,
    inOut: t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2,
    elasticOut: t => {
      const c4 = (2 * Math.PI) / 3;
      return t === 0 ? 0 : t === 1 ? 1 : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
    },
    bounceOut: t => {
      const n1 = 7.5625, d1 = 2.75;
      if (t < 1 / d1) return n1 * t * t;
      if (t < 2 / d1) return n1 * (t -= 1.5 / d1) * t + 0.75;
      if (t < 2.5 / d1) return n1 * (t -= 2.25 / d1) * t + 0.9375;
      return n1 * (t -= 2.625 / d1) * t + 0.984375;
    }
  };

  const lerp = (a, b, t) => a + (b - a) * t;
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

  // --- Colors ---
  const C = {
    wall: '#f5efe6',
    wallShadow: '#e8dfd3',
    floor1: '#d4a574',
    floor2: '#c49564',
    floorLine: '#b8845a',
    table: '#8B5E3C',
    tableTop: '#A0704D',
    window: '#87CEEB',
    windowFrame: '#5C4033',
  };

  // ============================================================
  //  DRAWING FUNCTIONS
  // ============================================================

  function drawBackground(ctx) {
    // Wall
    const wallGrad = ctx.createLinearGradient(0, 0, 0, H * 0.6);
    wallGrad.addColorStop(0, '#f5efe6');
    wallGrad.addColorStop(1, '#ece3d5');
    ctx.fillStyle = wallGrad;
    ctx.fillRect(0, 0, W, H * 0.62);

    // Wainscoting
    ctx.fillStyle = '#e0d4c0';
    ctx.fillRect(0, H * 0.55, W, H * 0.08);
    ctx.fillStyle = '#d4c8b0';
    ctx.fillRect(0, H * 0.55, W, 3);
    ctx.fillStyle = '#c8bca0';
    ctx.fillRect(0, H * 0.62, W, 4);

    // Floor
    for (let row = 0; row < 12; row++) {
      for (let col = 0; col < 16; col++) {
        const x = col * 60 + (row % 2) * 30;
        const y = H * 0.62 + row * 18;
        ctx.fillStyle = (col + row) % 2 === 0 ? C.floor1 : C.floor2;
        ctx.fillRect(x, y, 62, 19);
      }
    }

    // Floor line
    ctx.fillStyle = '#b8845a';
    ctx.fillRect(0, H * 0.62, W, 2);

    // Window
    const wx = 720, wy = 40, ww = 180, wh = 240;
    ctx.fillStyle = '#b0d8f0';
    ctx.fillRect(wx, wy, ww, wh);
    // Curtains
    ctx.fillStyle = '#c0392b';
    ctx.beginPath();
    ctx.moveTo(wx - 20, wy);
    ctx.quadraticCurveTo(wx + 10, wy + wh * 0.3, wx - 8, wy + wh);
    ctx.lineTo(wx - 20, wy + wh);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(wx + ww + 20, wy);
    ctx.quadraticCurveTo(wx + ww - 10, wy + wh * 0.3, wx + ww + 8, wy + wh);
    ctx.lineTo(wx + ww + 20, wy + wh);
    ctx.closePath();
    ctx.fill();
    // Window frame
    ctx.strokeStyle = C.windowFrame;
    ctx.lineWidth = 4;
    ctx.strokeRect(wx, wy, ww, wh);
    ctx.beginPath();
    ctx.moveTo(wx + ww / 2, wy);
    ctx.lineTo(wx + ww / 2, wy + wh);
    ctx.moveTo(wx, wy + wh / 2);
    ctx.lineTo(wx + ww, wy + wh / 2);
    ctx.stroke();
    // Moon & stars
    ctx.fillStyle = '#ffeaa7';
    ctx.beginPath();
    ctx.arc(wx + 50, wy + 50, 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff9';
    for (const [sx, sy] of [[wx + 100, 70], [wx + 140, 100], [wx + 80, 130], [wx + 160, 60], [wx + 50, 110]]) {
      ctx.beginPath();
      ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Picture on wall
    const px = 100, py = 55, pw = 100, ph = 70;
    ctx.fillStyle = '#8B5E3C';
    ctx.fillRect(px - 3, py - 3, pw + 6, ph + 6);
    ctx.fillStyle = '#a8d8a8';
    ctx.fillRect(px, py, pw, ph);
    ctx.fillStyle = '#6a9e6a';
    ctx.beginPath();
    ctx.arc(px + 30, py + 35, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#4a7e5a';
    ctx.beginPath();
    ctx.arc(px + 55, py + 42, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(px + 10, py + 80);
    ctx.quadraticCurveTo(px + 30, py + 30, px + 60, py + 20);
    ctx.quadraticCurveTo(px + 80, py + 30, px + 95, py + 80);
    ctx.fillStyle = '#5a8e5a';
    ctx.fill();

    // Lamp
    ctx.fillStyle = '#555';
    ctx.fillRect(340, 5, 4, 40);
    ctx.fillStyle = '#f39c1290';
    ctx.beginPath();
    ctx.moveTo(310, 50);
    ctx.quadraticCurveTo(342, 75, 374, 50);
    ctx.quadraticCurveTo(342, 60, 310, 50);
    ctx.fill();
    ctx.fillStyle = '#f1c40f40';
    ctx.beginPath();
    ctx.arc(342, 55, 35, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- Table ---
  function drawTable(ctx, x, y, w, h) {
    // Table top (oval)
    ctx.fillStyle = C.tableTop;
    ctx.beginPath();
    ctx.ellipse(x + w / 2, y + 5, w / 2, h / 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#7a4e2e';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Table leg
    ctx.fillStyle = C.table;
    ctx.fillRect(x + w / 2 - 5, y + 10, 10, 50);
    // Base
    ctx.fillStyle = C.table;
    ctx.beginPath();
    ctx.ellipse(x + w / 2, y + 58, 20, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- Draw a person (generic base) ---
  // type: 'waiter', 'diner1', 'diner2', 'diner3', 'diner4'
  function drawPerson(ctx, x, y, s, props) {
    // props: { bodyColor, hairColor, expression, armPose, legPose, bounce, headAngle, laughAmount, lookX }
    const { bodyColor = '#fff', hairColor = '#2d3436', expression = 'neutral',
            armPose = 'down', legPose = 'stand', bounce = 0,
            headAngle = 0, laughAmount = 0, lookX = 0, lookY = 0 } = props;

    const by = y + bounce;
    ctx.save();
    ctx.translate(x, by);
    ctx.scale(s, s);

    // Legs
    const legSpread = legPose === 'walk' ? 6 : 4;
    ctx.strokeStyle = '#2d3436';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-6, 30);
    ctx.lineTo(-6 - legSpread * 0.5, 55);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(6, 30);
    ctx.lineTo(6 + legSpread * 0.5, 55);
    ctx.stroke();
    // Shoes
    ctx.fillStyle = '#2d3436';
    ctx.beginPath();
    ctx.ellipse(-6 - legSpread * 0.5, 56, 7, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(6 + legSpread * 0.5, 56, 7, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.fillStyle = bodyColor;
    const bw = 24, bh = 34;
    const br = 6;
    ctx.beginPath();
    ctx.moveTo(-bw / 2 + br, 0);
    ctx.lineTo(bw / 2 - br, 0);
    ctx.quadraticCurveTo(bw / 2, 0, bw / 2, br);
    ctx.lineTo(bw / 2, bh - br);
    ctx.quadraticCurveTo(bw / 2, bh, bw / 2 - br, bh);
    ctx.lineTo(-bw / 2 + br, bh);
    ctx.quadraticCurveTo(-bw / 2, bh, -bw / 2, bh - br);
    ctx.lineTo(-bw / 2, br);
    ctx.quadraticCurveTo(-bw / 2, 0, -bw / 2 + br, 0);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#2d3436';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Arms
    ctx.strokeStyle = '#d4a574';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    const laughShake = laughAmount * 3;
    if (armPose === 'up') {
      ctx.beginPath();
      ctx.moveTo(-14, 8);
      ctx.quadraticCurveTo(-25, -8 + laughShake * 2, -22, -18 + laughShake);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(14, 8);
      ctx.quadraticCurveTo(25, -8 + laughShake, 28, -20 + laughShake);
      ctx.stroke();
    } else if (armPose === 'point') {
      ctx.beginPath();
      ctx.moveTo(-14, 8);
      ctx.quadraticCurveTo(-22, -4, -20, -10);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(14, 8);
      ctx.lineTo(35, -5 - laughShake);
      ctx.stroke();
      // Pointing hand
      ctx.fillStyle = '#d4a574';
      ctx.beginPath();
      ctx.arc(37, -5 - laughShake, 4, 0, Math.PI * 2);
      ctx.fill();
    } else if (armPose === 'holdTray') {
      // Left arm
      ctx.beginPath();
      ctx.moveTo(-14, 8);
      ctx.quadraticCurveTo(-24, -5, -18, -16);
      ctx.stroke();
      // Right arm
      ctx.beginPath();
      ctx.moveTo(14, 8);
      ctx.quadraticCurveTo(24, -5, 18, -16);
      ctx.stroke();
    } else if (armPose === 'down' || armPose === 'drop') {
      const drop = armPose === 'drop' ? 8 : 0;
      ctx.beginPath();
      ctx.moveTo(-14, 8);
      ctx.quadraticCurveTo(-20, 18 + drop, -18, 28 + drop);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(14, 8);
      ctx.quadraticCurveTo(20, 18 + drop, 18, 28 + drop);
      ctx.stroke();
    } else if (armPose === 'belly') {
      ctx.beginPath();
      ctx.moveTo(-14, 8);
      ctx.quadraticCurveTo(-18, 22 + laughShake, -12, 30 + laughShake);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(14, 8);
      ctx.quadraticCurveTo(18, 22 + laughShake, 12, 30 + laughShake);
      ctx.stroke();
    } else if (armPose === 'slap') {
      // Slapping table
      const slapY = 20 + laughShake;
      ctx.beginPath();
      ctx.moveTo(-14, 8);
      ctx.quadraticCurveTo(-24, slapY - 5, -22, slapY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(14, 8);
      ctx.quadraticCurveTo(24, slapY - 5, 22, slapY);
      ctx.stroke();
    } else if (armPose === 'phone') {
      ctx.beginPath();
      ctx.moveTo(-14, 8);
      ctx.lineTo(-20, 16);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(14, 8);
      ctx.quadraticCurveTo(20, 2, 22, -4);
      ctx.stroke();
    }

    // Neck
    ctx.fillStyle = '#d4a574';
    ctx.fillRect(-5, -2, 10, 6);

    // Head
    const hx = lookX * 2, hy = lookY * 2 - 2 + laughAmount * 0.5;
    ctx.save();
    ctx.translate(0, -18);
    ctx.rotate(headAngle * Math.PI / 180);
    // Head shape
    ctx.fillStyle = '#d4a574';
    ctx.beginPath();
    ctx.ellipse(hx, hy, 15, 16, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#2d3436';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Hair
    ctx.fillStyle = hairColor;
    if (hairColor === '#2d3436') {
      // Short hair
      ctx.beginPath();
      ctx.ellipse(hx, hy - 13, 16, 10, 0, Math.PI, Math.PI * 2);
      ctx.fill();
      // Some hair strands
      ctx.beginPath();
      ctx.moveTo(hx - 10, hy - 10);
      ctx.quadraticCurveTo(hx - 8, hy - 18, hx - 3, hy - 12);
      ctx.strokeStyle = hairColor;
      ctx.lineWidth = 2;
      ctx.stroke();
    } else {
      // Longer hair (for women / different characters)
      ctx.beginPath();
      ctx.ellipse(hx, hy - 14, 17, 12, 0, Math.PI, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(hx - 16, hy - 5);
      ctx.quadraticCurveTo(hx - 18, hy + 5, hx - 14, hy + 12);
      ctx.strokeStyle = hairColor;
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(hx + 16, hy - 5);
      ctx.quadraticCurveTo(hx + 18, hy + 5, hx + 14, hy + 12);
      ctx.stroke();
    }

    // Expression
    drawExpression(ctx, hx, hy, expression, laughAmount);

    ctx.restore();
    ctx.restore();
  }

  function drawExpression(ctx, hx, hy, expr, laugh) {
    const la = clamp(laugh, 0, 1);
    const ey = hy - 2;
    const ex = hx;

    if (expr === 'laugh' || (expr === 'neutral' && la > 0.5)) {
      // Laughing eyes (closed crescents)
      ctx.strokeStyle = '#2d3436';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      // Left eye
      ctx.beginPath();
      ctx.arc(ex - 5, ey - 1, 2.5 + la, 0, Math.PI);
      ctx.stroke();
      // Right eye
      ctx.beginPath();
      ctx.arc(ex + 5, ey - 1, 2.5 + la, 0, Math.PI);
      ctx.stroke();
      // Laughing mouth - wide open
      const mouthOpen = 4 + la * 6;
      ctx.fillStyle = '#c0392b';
      ctx.beginPath();
      ctx.ellipse(ex, ey + 5 + la * 2, 5 + la * 3, mouthOpen * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#2d3436';
      ctx.lineWidth = 1.2;
      ctx.stroke();
      // Tongue
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath();
      ctx.ellipse(ex, ey + 7 + la * 3, 3 + la * 1.5, 2 + la, 0, 0, Math.PI);
      ctx.fill();
      // Teeth
      ctx.fillStyle = '#fff';
      ctx.fillRect(ex - 4 - la * 1.5, ey + 3 + la * 0.5, 8 + la * 3, 3 + la);
      ctx.strokeStyle = '#bbb';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(ex - 4 - la * 1.5, ey + 3 + la * 0.5, 8 + la * 3, 3 + la);
      // Tear of laughter
      if (la > 0.3) {
        ctx.fillStyle = '#74b9ff';
        ctx.beginPath();
        ctx.ellipse(ex - 8, ey + 3 + la * 8, 1.5, 2 + la * 3, -0.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(ex + 9, ey + 5 + la * 7, 1.2, 1.8 + la * 2.5, 0.2, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (expr === 'surprised') {
      // Wide eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ex - 5, ey - 1, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex + 5, ey - 1, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#2d3436';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // Pupils (small)
      ctx.fillStyle = '#2d3436';
      ctx.beginPath();
      ctx.arc(ex - 4.5, ey, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex + 5.5, ey, 2, 0, Math.PI * 2);
      ctx.fill();
      // Mouth (circle of surprise)
      ctx.fillStyle = '#2d3436';
      ctx.beginPath();
      ctx.ellipse(ex, ey + 6, 4, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#c0392b';
      ctx.beginPath();
      ctx.ellipse(ex, ey + 5, 3, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      // Eyebrows raised
      ctx.strokeStyle = '#2d3436';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ex - 9, ey - 7);
      ctx.lineTo(ex - 2, ey - 9);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ex + 9, ey - 7);
      ctx.lineTo(ex + 2, ey - 9);
      ctx.stroke();
    } else if (expr === 'embarrassed') {
      // Wavy squint eyes
      ctx.strokeStyle = '#2d3436';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(ex - 5, ey - 1, 2.5, 0.2, Math.PI - 0.2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(ex + 5, ey - 1, 2.5, 0.2, Math.PI - 0.2);
      ctx.stroke();
      // Wavy mouth
      ctx.strokeStyle = '#2d3436';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ex - 5, ey + 6 + la);
      ctx.quadraticCurveTo(ex - 2, ey + 3 + la, ex, ey + 6 + la);
      ctx.quadraticCurveTo(ex + 2, ey + 9 + la, ex + 5, ey + 6 + la);
      ctx.stroke();
      // Blush
      ctx.fillStyle = '#ff6b6b40';
      ctx.beginPath();
      ctx.ellipse(ex - 8, ey + 4, 4, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(ex + 8, ey + 4, 4, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Sweat drop
      ctx.fillStyle = '#74b9ff';
      ctx.beginPath();
      ctx.moveTo(ex + 12, ey - 8);
      ctx.quadraticCurveTo(ex + 15, ey - 4, ex + 12, ey - 2);
      ctx.quadraticCurveTo(ex + 9, ey - 4, ex + 12, ey - 8);
      ctx.fill();
    } else {
      // Neutral - normal eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ex - 5, ey - 1, 3.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex + 5, ey - 1, 3.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#2d3436';
      ctx.lineWidth = 1.2;
      ctx.stroke();
      ctx.fillStyle = '#2d3436';
      ctx.beginPath();
      ctx.arc(ex - 4.5, ey, 1.8, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex + 5.5, ey, 1.8, 0, Math.PI * 2);
      ctx.fill();
      // Small smile
      ctx.strokeStyle = '#2d3436';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(ex, ey + 3, 4, 0.2, Math.PI - 0.2);
      ctx.stroke();
    }
  }

  // --- Draw waiter (has bow tie, apron, tray) ---
  function drawWaiter(ctx, x, y, s, state, time) {
    const { walkPhase, trayAngle, trayDropY, expression, armPose, bounce, wobble } = state;

    ctx.save();
    ctx.translate(x, y + bounce);
    ctx.scale(s, s);

    // Legs with walk animation
    const legSwing = walkPhase !== undefined ? Math.sin(walkPhase) * 5 : 0;
    ctx.strokeStyle = '#2d3436';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    // Left leg
    ctx.beginPath();
    ctx.moveTo(-6, 30);
    ctx.lineTo(-6 + legSwing, 55);
    ctx.stroke();
    // Right leg
    ctx.beginPath();
    ctx.moveTo(6, 30);
    ctx.lineTo(6 - legSwing, 55);
    ctx.stroke();
    // Shoes
    ctx.fillStyle = '#2d3436';
    ctx.beginPath();
    ctx.ellipse(-6 + legSwing, 56, 7, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(6 - legSwing, 56, 7, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body (white shirt)
    ctx.fillStyle = '#f8f8f8';
    ctx.beginPath();
    ctx.roundRect(-12, 0, 24, 34, 5);
    ctx.fill();
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Apron
    ctx.fillStyle = '#2d3436';
    ctx.beginPath();
    ctx.moveTo(-10, 10);
    ctx.lineTo(-11, 34);
    ctx.quadraticCurveTo(-11, 37, -8, 37);
    ctx.lineTo(8, 37);
    ctx.quadraticCurveTo(11, 37, 11, 34);
    ctx.lineTo(10, 10);
    ctx.closePath();
    ctx.fill();
    // Apron strap
    ctx.strokeStyle = '#2d3436';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-10, 10);
    ctx.quadraticCurveTo(-8, 6, -5, 5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(10, 10);
    ctx.quadraticCurveTo(8, 6, 5, 5);
    ctx.stroke();

    // Bow tie
    ctx.fillStyle = '#c0392b';
    ctx.beginPath();
    ctx.moveTo(-7, 4);
    ctx.lineTo(-2, 7);
    ctx.lineTo(-7, 10);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(7, 4);
    ctx.lineTo(2, 7);
    ctx.lineTo(7, 10);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#a93226';
    ctx.beginPath();
    ctx.arc(0, 7, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Arms
    ctx.strokeStyle = '#d4a574';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    const armSwing = walkPhase !== undefined ? Math.cos(walkPhase) * 3 : 0;

    if (armPose === 'holdTray' || armPose === 'wobble') {
      const w = wobble || 0;
      // Left arm holding tray
      ctx.beginPath();
      ctx.moveTo(-12, 8);
      ctx.quadraticCurveTo(-22 - armSwing, -2 + w * 3, -16 + w, -16);
      ctx.stroke();
      // Right arm holding tray
      ctx.beginPath();
      ctx.moveTo(12, 8);
      ctx.quadraticCurveTo(22 + armSwing, -2 - w * 3, 16 - w, -16);
      ctx.stroke();
    } else if (armPose === 'drop') {
      // Arms dropped in shock
      ctx.beginPath();
      ctx.moveTo(-12, 8);
      ctx.lineTo(-20, 22);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(12, 8);
      ctx.lineTo(20, 22);
      ctx.stroke();
    } else if (armPose === 'facepalm') {
      ctx.beginPath();
      ctx.moveTo(-12, 8);
      ctx.quadraticCurveTo(-20, 2, -8, -6);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(12, 8);
      ctx.quadraticCurveTo(20, 2, 8, -6);
      ctx.stroke();
    }

    // Neck
    ctx.fillStyle = '#d4a574';
    ctx.fillRect(-5, -2, 10, 6);

    // Head
    ctx.save();
    ctx.translate(0, -18);

    // Head shape
    ctx.fillStyle = '#d4a574';
    ctx.beginPath();
    ctx.ellipse(0, -2, 15, 16, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#2d3436';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Hair (slicked back style)
    ctx.fillStyle = '#2d3436';
    ctx.beginPath();
    ctx.ellipse(0, -15, 16, 10, 0, Math.PI, Math.PI * 2);
    ctx.fill();
    // Hair swoop
    ctx.beginPath();
    ctx.moveTo(-12, -12);
    ctx.quadraticCurveTo(-5, -22, 8, -14);
    ctx.quadraticCurveTo(12, -12, 14, -10);
    ctx.strokeStyle = '#2d3436';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Expression
    drawExpression(ctx, 0, -2, expression, 0);

    ctx.restore();

    // Tray (drawn above arms)
    if (armPose === 'holdTray' || armPose === 'wobble') {
      ctx.save();
      const ty = -34 + (trayDropY || 0);
      ctx.translate(0, ty);
      ctx.rotate(trayAngle || 0);

      // Tray
      ctx.fillStyle = '#bdc3c7';
      ctx.beginPath();
      ctx.ellipse(0, 0, 32, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#95a5a6';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // Tray rim
      ctx.strokeStyle = '#7f8c8d';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(0, 0, 30, 5, 0, 0, Math.PI * 2);
      ctx.stroke();

      // Tray items
      // Wine bottle
      ctx.fillStyle = '#27ae60';
      ctx.fillRect(-10, -22, 6, 20);
      ctx.fillStyle = '#1e8449';
      ctx.fillRect(-9, -22, 4, 2);
      ctx.fillRect(-9, -14, 4, 2);
      ctx.fillRect(-9, -8, 4, 2);
      // Bottleneck
      ctx.fillStyle = '#27ae60';
      ctx.fillRect(-9, -30, 4, 8);
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(-10, -32, 6, 4);
      // Label
      ctx.fillStyle = '#f1c40f';
      ctx.fillRect(-9, -20, 4, 4);
      ctx.globalAlpha = 0.5;
      ctx.restore();
      ctx.globalAlpha = 1;

      // Wine glass
      ctx.save();
      ctx.translate(15, -34 + (trayDropY || 0));
      ctx.rotate((trayAngle || 0) * 0.8);
      ctx.fillStyle = '#ecf0f180';
      ctx.strokeStyle = '#bdc3c7';
      ctx.lineWidth = 1.5;
      // Bowl
      ctx.beginPath();
      ctx.ellipse(0, 4, 8, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      // Stem
      ctx.beginPath();
      ctx.moveTo(0, 14);
      ctx.lineTo(0, 22);
      ctx.stroke();
      // Base
      ctx.beginPath();
      ctx.ellipse(0, 22, 7, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      // Wine inside
      ctx.fillStyle = '#e74c3c60';
      ctx.beginPath();
      ctx.ellipse(0, 5, 6.5, 5, 0, Math.PI, 0);
      ctx.fill();
      ctx.restore();

      // Glass 2 (on other side)
      ctx.save();
      ctx.translate(-16, -34 + (trayDropY || 0));
      ctx.rotate((trayAngle || 0) * 0.7);
      ctx.fillStyle = '#ecf0f180';
      ctx.strokeStyle = '#bdc3c7';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(0, 4, 7, 9, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, 13);
      ctx.lineTo(0, 20);
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(0, 20, 6, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#f1c40f60';
      ctx.beginPath();
      ctx.ellipse(0, 5, 5.5, 4.5, 0, Math.PI, 0);
      ctx.fill();
      ctx.restore();
    }

    // Flying items after drop
    if (armPose === 'drop' || armPose === 'facepalm') {
      // Draw tray on the ground
      ctx.save();
      ctx.translate(5, 10 + (trayDropY || 0));
      ctx.rotate(0.4);
      ctx.fillStyle = '#bdc3c7';
      ctx.beginPath();
      ctx.ellipse(0, 0, 30, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#95a5a6';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
    }

    ctx.restore();
  }

  // --- Flying objects ---
  function drawFlyingObjects(ctx, items) {
    for (const item of items) {
      ctx.save();
      ctx.translate(item.x, item.y);
      ctx.rotate(item.rot);

      if (item.type === 'bottle') {
        ctx.fillStyle = '#27ae60';
        ctx.fillRect(-5, -12, 10, 18);
        ctx.fillStyle = '#1e8449';
        ctx.fillRect(-5, -12, 10, 3);
        ctx.fillRect(-5, 0, 10, 3);
        ctx.fillStyle = '#27ae60';
        ctx.fillRect(-4, -16, 8, 5);
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(-5, -18, 10, 3);
        // Liquid spill
        ctx.fillStyle = '#e74c3c80';
        ctx.beginPath();
        ctx.ellipse(8, 4, 8, 5, 0.5, 0, Math.PI * 2);
        ctx.fill();
      } else if (item.type === 'glass') {
        ctx.fillStyle = '#ecf0f160';
        ctx.strokeStyle = '#bdc3c7';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(0, 3, 6, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, 11);
        ctx.lineTo(0, 17);
        ctx.stroke();
        ctx.fillStyle = '#e74c3c50';
        ctx.beginPath();
        ctx.ellipse(0, 4, 4.5, 4, 0, Math.PI, 0);
        ctx.fill();
        // Splash
        ctx.fillStyle = '#e74c3c70';
        ctx.beginPath();
        ctx.arc(10, 0, 6, 0, Math.PI * 2);
        ctx.fill();
      } else if (item.type === 'splash') {
        ctx.fillStyle = `rgba(231, 76, 60, ${item.alpha || 0.6})`;
        for (const [dx, dy, r] of item.drops || [[0, 0, 5]]) {
          ctx.beginPath();
          ctx.arc(dx, dy, r, 0, Math.PI * 2);
          ctx.fill();
        }
        // Star splats
        ctx.fillStyle = '#e74c3c40';
        for (let i = 0; i < 4; i++) {
          const a = i * Math.PI / 2 + item.rot;
          ctx.beginPath();
          ctx.arc(Math.cos(a) * 8, Math.sin(a) * 8, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.restore();
    }
  }

  // --- Laughing effects (stars, "HA" text) ---
  function drawLaughEffects(ctx, effects) {
    for (const e of effects) {
      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.globalAlpha = e.alpha || 0.8;

      // Laugh stars
      const starSize = e.size || 4;
      ctx.fillStyle = '#f1c40f';
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i * 4 * Math.PI / 5) + e.rot;
        const r = i === 0 ? starSize : starSize;
        if (i === 0) ctx.moveTo(Math.cos(a) * starSize, Math.sin(a) * starSize);
        else ctx.lineTo(Math.cos(a) * starSize, Math.sin(a) * starSize);
      }
      ctx.closePath();
      ctx.fill();

      // "HA" text
      if (e.showHa) {
        ctx.fillStyle = '#e74c3c';
        ctx.font = `bold ${e.haSize || 18}px Arial, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('HA', 0, 0);
      }

      ctx.restore();
    }
  }

  // ============================================================
  //  ANIMATION STATE
  // ============================================================

  let startTime = 0;
  let animId = null;
  let done = false;

  const ANIM_DURATION = 7; // seconds

  // Flying items & effects
  let flyingItems = [];
  let laughEffects = [];

  function resetAnimation() {
    startTime = performance.now();
    done = false;
    flyingItems = [];
    laughEffects = [];
    replayBtn.style.display = 'none';
    if (animId) cancelAnimationFrame(animId);
    animId = requestAnimationFrame(animate);
  }

  function animate(timestamp) {
    if (!startTime) startTime = timestamp;
    const t = (timestamp - startTime) / 1000;
    const p = clamp(t / ANIM_DURATION, 0, 1); // 0-1 progress

    ctx.clearRect(0, 0, W, H);

    // ---- Draw background ----
    drawBackground(ctx);

    // Tables
    drawTable(ctx, 80, 360, 100, 60);  // left table
    drawTable(ctx, 460, 370, 110, 60); // right table
    drawTable(ctx, 740, 355, 100, 58); // far right table

    // ---- Animation phases ----
    // Phase 1 (0-1.5s): Waiter walks in
    // Phase 2 (1.5-2.5s): Waiter stops, tray wobbles
    // Phase 3 (2.5-3.0s): Tray drops
    // Phase 4 (3.0-4.5s): Everyone reacts
    // Phase 5 (4.5-6.5s): Full laughter
    // Phase 6 (6.5-7.0s): Hold

    const phase1End = 1.5;
    const phase2End = 2.6;
    const phase3End = 3.0;
    const phase4End = 4.5;
    const phase5End = 6.8;

    // ---- Waiter ----
    let waiterX, waiterY = 280, waiterS = 1.1;
    let waiterState = {};

    if (t < phase1End) {
      // Walking in
      const p1 = t / phase1End;
      const ep = ease.out(p1);
      waiterX = lerp(-150, 240, ep);
      const bounceWalk = Math.sin(t * 12) * 2.5 * (1 - p1 * 0.5);
      waiterState = {
        walkPhase: t * 8,
        trayAngle: Math.sin(t * 2) * 0.01,
        trayDropY: 0,
        expression: 'neutral',
        armPose: 'holdTray',
        bounce: bounceWalk,
        wobble: 0
      };
    } else if (t < phase2End) {
      // Wobbling
      const p2 = (t - phase1End) / (phase2End - phase1End);
      waiterX = 240;
      const wobbleIntensity = ease.in(p2) * 0.15;
      waiterState = {
        walkPhase: 0,
        trayAngle: Math.sin(t * 14) * wobbleIntensity,
        trayDropY: Math.sin(t * 10) * 1,
        expression: 'surprised',
        armPose: 'wobble',
        bounce: Math.sin(t * 16) * 1.5 * wobbleIntensity * 4,
        wobble: Math.sin(t * 14) * wobbleIntensity * 10
      };
    } else if (t < phase3End) {
      // Drop!
      const p3 = (t - phase2End) / (phase3End - phase2End);
      waiterX = 240;
      const dropRot = -0.2 - ease.in(p3) * 1.0;
      const dropY = ease.in(p3) * 18;

      waiterState = {
        walkPhase: 0,
        trayAngle: dropRot,
        trayDropY: dropY,
        expression: 'surprised',
        armPose: 'drop',
        bounce: 0,
        wobble: 0
      };

      // Generate flying items at moment of drop
      if (p3 > 0.1 && p3 < 0.15 && flyingItems.length === 0) {
        flyingItems = [
          { type: 'bottle', x: 210, y: 225, rot: 0.3, vy: -6, vx: -3, vr: 0.15 },
          { type: 'glass', x: 260, y: 230, rot: -0.2, vy: -7, vx: 4, vr: -0.2 },
          { type: 'glass', x: 235, y: 235, rot: 0.5, vy: -5, vx: -2, vr: 0.25 },
          { type: 'splash', x: 240, y: 260, rot: 0, alpha: 0.8,
            drops: [[0,0,8],[6,-3,4],[-5,-4,5],[3,5,3],[-3,4,4]] },
        ];
      }

      // Animate flying items
      if (flyingItems.length > 0) {
        const dt = 0.016;
        for (const item of flyingItems) {
          if (item.vy !== undefined) {
            item.x += (item.vx || 0) * dt * 60;
            item.y += (item.vy || 0) * dt * 60;
            item.vy += 0.15 * dt * 60; // gravity
            item.rot += (item.vr || 0) * dt * 60;
          }
          if (item.type === 'splash') {
            item.alpha = Math.max(0, item.alpha - 0.003 * dt * 60);
          }
        }
        // Remove items that go off screen
        flyingItems = flyingItems.filter(item =>
          item.y < 500 && item.x > -50 && item.x < 1000
        );
      }
    } else {
      // After drop - embarrassed
      waiterX = 240;
      const pAfter = (t - phase3End);
      let expr, armPose;
      if (pAfter < 0.8) {
        expr = 'surprised';
        armPose = 'drop';
      } else {
        expr = 'embarrassed';
        armPose = 'facepalm';
      }
      waiterState = {
        walkPhase: 0,
        trayAngle: -0.3,
        trayDropY: 18,
        expression: expr,
        armPose: armPose,
        bounce: 0,
        wobble: 0
      };
    }

    drawWaiter(ctx, waiterX, waiterY, waiterS, waiterState, t);

    // Draw flying objects
    drawFlyingObjects(ctx, flyingItems);

    // ---- Diners ----
    // Diner 1: Left table, pointing and laughing
    const d1Laugh = clamp((t - 2.8) * 1.2, 0, 1);
    drawPerson(ctx, 120, 355, 1.0, {
      bodyColor: '#3498db', hairColor: '#2d3436',
      expression: 'laugh', armPose: 'point', legPose: 'sit',
      bounce: d1Laugh * Math.sin(t * 8) * 4,
      laughAmount: d1Laugh,
      lookX: 0.3, lookY: 0
    });

    // Diner 2: Right table, slapping table laughing
    const d2Laugh = clamp((t - 2.9) * 1.3, 0, 1);
    drawPerson(ctx, 500, 365, 1.05, {
      bodyColor: '#e74c3c', hairColor: '#8B4513',
      expression: 'laugh', armPose: 'slap', legPose: 'sit',
      bounce: d2Laugh * Math.sin(t * 9 + 1) * 5,
      laughAmount: d2Laugh,
      lookX: -0.4, lookY: 0
    });

    // Diner 3: Standing back center, holding belly
    const d3Laugh = clamp((t - 3.0) * 1.4, 0, 1);
    drawPerson(ctx, 370, 298, 1.0, {
      bodyColor: '#f39c12', hairColor: '#2d3436',
      expression: 'laugh', armPose: 'belly', legPose: 'stand',
      bounce: d3Laugh * Math.sin(t * 7 + 2) * 6,
      laughAmount: d3Laugh,
      lookX: -0.2, lookY: 0.1
    });

    // Diner 4: Far right, on phone, looks up and laughs
    const d4Laugh = clamp((t - 3.2) * 1.1, 0, 1);
    const d4Expr = t < 3.0 ? 'neutral' : 'laugh';
    drawPerson(ctx, 775, 350, 0.95, {
      bodyColor: '#9b59b6', hairColor: '#8B4513',
      expression: d4Expr, armPose: d4Laugh > 0.5 ? 'up' : 'phone',
      legPose: 'sit', bounce: d4Laugh > 0.3 ? d4Laugh * Math.sin(t * 8 + 3) * 3 : 0,
      laughAmount: d4Laugh,
      lookX: -0.3, lookY: 0
    });

    // ---- Laugh effects (stars, "HA" text) ----
    // Generate laugh effects during reaction phases
    const laughP = clamp((t - 3.0) / 2.5, 0, 1);

    // Generate "HA" texts periodically during laughter
    if (t > 3.0 && t < 6.0 && Math.random() < 0.02 * laughP) {
      const sources = [
        { x: 140, y: 310 },  // diner 1
        { x: 520, y: 320 },  // diner 2
        { x: 380, y: 260 },  // diner 3
        { x: 790, y: 310 },  // diner 4
      ];
      const src = sources[Math.floor(Math.random() * sources.length)];
      laughEffects.push({
        x: src.x + (Math.random() - 0.5) * 40,
        y: src.y - 20 + Math.random() * 30,
        rot: Math.random() * 0.5,
        alpha: 0.8 + Math.random() * 0.2,
        size: 3 + Math.random() * 4,
        showHa: Math.random() > 0.5,
        haSize: 14 + Math.random() * 8,
        life: 1.0
      });
    }

    // Fade effects
    laughEffects = laughEffects.filter(e => {
      e.life -= 0.008;
      e.alpha = e.life * 0.8;
      e.y -= 0.3;
      return e.life > 0;
    });
    // Limit
    if (laughEffects.length > 30) laughEffects = laughEffects.slice(-30);

    drawLaughEffects(ctx, laughEffects);

    // ---- Overlay title ----
    if (t > 5.5) {
      const alpha = clamp((t - 5.5) / 0.8, 0, 1);
      ctx.save();
      ctx.globalAlpha = ease.out(alpha);
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.beginPath();
      ctx.roundRect(W / 2 - 110, 20, 220, 40, 20);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 22px "Arial", "Microsoft YaHei", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('😅 哎呀，没端住！', W / 2, 40);
      ctx.restore();
    }

    // ---- Check if done ----
    if (t >= ANIM_DURATION) {
      done = true;
      replayBtn.style.display = 'block';
      return; // stop animation
    }

    animId = requestAnimationFrame(animate);
  }

  // ---- Start ----
  resetAnimation();

  // ---- Replay ----
  replayBtn.addEventListener('click', resetAnimation);
  canvas.addEventListener('click', () => {
    if (done) resetAnimation();
  });



  var oldReset=resetAnimation;
  resetAnimation=function(){
    startTime=performance.now();done=false;flyingItems=[];laughEffects=[];
    if(trayAnimId)cancelAnimationFrame(trayAnimId);
    trayAnimId=requestAnimationFrame(animate);
  };
  resetAnimation();
}function toggleGame(){
  var w=document.getElementById('gameWrap');
  if(w)w.classList.toggle('show');
}
function startGame(){
  if(gameRun)return;
  gameRun=true;gameOver=false;gameScore=0;player.y=80;player.vy=0;player.jumping=false;obstacles=[];
  drawGame();
  gameLoop();
}
function gameLoop(){
  if(!gameRun)return;
  frame++;
  // gravity
  if(player.jumping){
    player.vy+=0.4;
    player.y+=player.vy;
    if(player.y>=80){player.y=80;player.jumping=false;player.vy=0;}
  }
  // obstacles
  if(frame%50===0){
    obstacles.push({x:320,y:88,w:8,h:10});
  }
  for(var i=obstacles.length-1;i>=0;i--){
    obstacles[i].x-=gameSpeed;
    if(obstacles[i].x+obstacles[i].w<0)obstacles.splice(i,1);
  }
  // collision
  if(!gameOver){
    for(var i=0;i<obstacles.length;i++){
      var o=obstacles[i];
      if(player.x+player.w>o.x&&player.x<o.x+o.w&&player.y+player.h>o.y){
        gameOver=true;gameRun=false;
        setTimeout(function(){gameRun=false;drawGame();},100);
        break;
      }
    }
    if(!gameOver)gameScore+=1;
  }
  drawGame();
  if(gameRun)requestAnimationFrame(gameLoop);
}
function drawGame(){
  var c=document.getElementById('gameCanvas');
  if(!c)return;var ctx=c.getContext('2d');
  // clear
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,320,120);
  // ground
  ctx.fillStyle='#16213e';ctx.fillRect(0,100,320,20);
  ctx.fillStyle='#0f3460';for(var i=0;i<320;i+=16){ctx.fillRect(i,100,8,3);}
  // player (pixel dude)
  ctx.fillStyle='#e94560';
  ctx.fillRect(player.x,player.y,player.w,player.h);
  ctx.fillStyle='#fff';ctx.fillRect(player.x+2,player.y+2,3,3);ctx.fillRect(player.x+7,player.y+2,3,3);
  // obstacles (pixel blocks)
  ctx.fillStyle='#c7c7c7';
  for(var i=0;i<obstacles.length;i++){
    var o=obstacles[i];
    ctx.fillRect(o.x,o.y,o.w,o.h);
    ctx.fillStyle='#888';ctx.fillRect(o.x+2,o.y+2,2,2);ctx.fillStyle='#c7c7c7';
  }
  // score
  if(!gameOver&&gameRun){ctx.fillStyle='#e2e8f0';ctx.font='8px monospace';ctx.fillText('分数:'+Math.floor(gameScore/5),260,20);}
  if(gameOver){ctx.fillStyle='#ef4444';ctx.font='10px monospace';ctx.fillText('游戏结束',130,55);ctx.fillStyle='#94a3b8';ctx.font='7px monospace';ctx.fillText('点击"开始"重玩',120,80);}
  if(gameOver&&!gameRun){ctx.fillStyle='#e94560';ctx.font='8px monospace';ctx.fillText('得分:'+Math.floor(gameScore/5),140,40);}
}
// keyboard
document.addEventListener('keydown',function(e){
  if(e.code==='Space'){
    if(gameOver){startGame();return;}
    if(gameRun&&!player.jumping){player.vy=-5;player.jumping=true;}
  }
});
// touch
document.addEventListener('click',function(e){
  var c=document.getElementById('gameCanvas');
  if(c&&c.contains(e.target)&&gameRun&&!player.jumping&&!gameOver){player.vy=-5;player.jumping=true;}
});
// initial draw
setTimeout(function(){drawGame();},500);

function boot(){
  renderAll();
  initSplash();
  initSections();
  
  fetch('/api/workflow').then(r=>r.json()).then(j=>{
    if(j.data&&Object.keys(j.data).length>0){
      try{
        const existing=JSON.parse(localStorage.getItem(KEY))||{};
        const merged={...j.data};
        Object.keys(merged).forEach(k=>{
          if(existing[k]!==undefined)delete merged[k];
        });
        if(Object.keys(merged).length>0){
          localStorage.setItem(KEY,JSON.stringify({...existing,...merged}));
          renderAll();
        }
      }catch(e){/*ignore*/}
    }
  }).catch(()=>{});
  setInterval(()=>{const s=load();if(Object.keys(s).length>0)fetch('/api/workflow',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...s,_t:Date.now()})}).catch(()=>{})},30000);
  setInterval(renderAll,60000);
}
boot();
</script>
